name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" --repo "${{ github.repository }}" &>/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.version.outputs.version }} already exists — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No release found for v${{ steps.version.outputs.version }} — building."
          fi

      - name: Set up Node.js
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm install

      - name: Build universal native binary
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p bin
          clang -fobjc-arc -framework CoreBluetooth -framework Foundation \
            -target arm64-apple-macos11 \
            -o bin/zmk-ble-helper-arm64 native/zmk-ble-helper.m
          clang -fobjc-arc -framework CoreBluetooth -framework Foundation \
            -target x86_64-apple-macos10.15 \
            -o bin/zmk-ble-helper-x86 native/zmk-ble-helper.m
          lipo -create bin/zmk-ble-helper-arm64 bin/zmk-ble-helper-x86 \
            -output bin/zmk-ble-helper
          rm bin/zmk-ble-helper-arm64 bin/zmk-ble-helper-x86

      - name: Build webpack bundles
        if: steps.check.outputs.exists == 'false'
        run: npm run build

      - name: Package extension
        if: steps.check.outputs.exists == 'false'
        run: npx @vscode/vsce package

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            "zmk-studio-vscode-${{ steps.version.outputs.version }}.vsix"
